<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#FF6B00"/>
  <g fill="white">
    <!--
      Stylized swift, flying to the right.
      All shapes drawn in absolute coords (512x512 canvas).
      Bird is centered around x=260, y=260.
    -->

    <!-- BODY: elongated teardrop, horizontal -->
    <ellipse cx="275" cy="265" rx="80" ry="28" transform="rotate(-8, 275, 265)"/>

    <!-- HEAD: circle -->
    <circle cx="348" cy="248" r="30"/>

    <!-- BEAK: small triangle to the right -->
    <polygon points="374,244  402,248  374,254"/>

    <!-- EYE -->
    <circle cx="356" cy="244" r="8" fill="#FF6B00"/>

    <!-- UPPER WING: large swept wing, going up and to the left -->
    <path d="
      M 255,248
      C 230,230  195,205  158,192
      C 120,179   80,178   58,190
      C 40,200   35,218   45,232
      C 55,244   72,248   92,246
      C 114,244  136,238  155,234
      C 178,229  205,228  228,238
      C 240,244  248,250  255,248
      Z
    "/>

    <!-- LOWER WING: smaller wing going down-left -->
    <path d="
      M 250,275
      C 228,285  200,295  172,298
      C 144,301  118,294  102,280
      C 88,268   86,252   98,244
      C 108,237  124,238  138,244
      C 154,251  165,262  178,270
      C 195,279  220,280  240,276
      Z
    "/>

    <!-- TAIL TOP PRONG: long, thin, curving down-left -->
    <path d="
      M 200,272
      C 182,274  158,274  132,268
      C 104,261   78,245   62,224
      C 46,203   44,180   56,166
      C 64,156   78,153   90,158
      C 104,164  112,180  116,196
      C 120,212  120,226  128,238
      C 138,252  160,262  182,266
      Z
    "/>

    <!-- TAIL BOTTOM PRONG: long, thin, curving further down-left -->
    <path d="
      M 205,282
      C 188,292  166,306  140,312
      C 110,320   78,313   58,294
      C 38,276   36,250   50,232
      C 60,219   76,215   90,220
      C 104,226  112,242  116,256
      C 120,270  124,282  138,290
      C 154,299  176,294  198,284
      Z
    "/>

    <!-- Chat bubble dots (3 dots, floating above head) -->
    <circle cx="300" cy="200" r="12"/>
    <circle cx="330" cy="190" r="12"/>
    <circle cx="360" cy="184" r="12"/>
  </g>
</svg>
