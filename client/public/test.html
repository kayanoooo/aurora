<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Test</h1>
    <input type="text" id="token" placeholder="Token" size="50">
    <button onclick="connect()">Connect</button>
    <button onclick="send()">Send Test Message</button>
    <div id="log"></div>

    <script>
        let ws = null;
        
        function connect() {
            const token = document.getElementById('token').value;
            ws = new WebSocket(`ws://192.168.1.2:8000/ws?token=${token}`);
            
            ws.onopen = () => log('✅ Connected');
            ws.onclose = () => log('❌ Disconnected');
            ws.onerror = (e) => log('Error: ' + e);
            ws.onmessage = (e) => log('Received: ' + e.data);
        }
        
        function send() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'message',
                    receiver_id: 2,
                    message_text: 'Test message'
                }));
                log('Sent test message');
            } else {
                log('WebSocket not connected');
            }
        }
        
        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML += '<div>' + msg + '</div>';
        }
    </script>
</body>
</html>
